- name: Hermes
  hosts: all
  gather_facts: false
  vars_files:
    - ../vars/main.yml

  tasks:
  # Installation
  # curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
  - name: Installation
    tags: [init, update]
    ansible.builtin.import_tasks:
      file: ../tasks/script.yml
    vars:
      url: "{{ hermes_install_url }}"
      cmd: /bin/bash -c /tmp/install.sh

  # Version
  - name: Version
    tags: [init, update]
    ansible.builtin.import_tasks:
      file: ../tasks/version.yml
    vars:
      cmd: hermes --version
